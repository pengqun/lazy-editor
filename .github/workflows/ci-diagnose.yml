name: CI Diagnose

on:
  workflow_dispatch:
    inputs:
      run_diagnose:
        description: 'Run test diagnose script (npm run test:diagnose)'
        required: true
        type: boolean
        default: true

jobs:
  test-diagnose:
    name: Test diagnose (manual)
    if: ${{ inputs.run_diagnose }}
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci

      - name: Run diagnose tests
        run: npm run test:diagnose

      - name: Upload diagnose artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnose-${{ github.run_id }}
          path: .artifacts/test-diagnose/**
          if-no-files-found: warn
