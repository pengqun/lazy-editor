name: CI Diagnose

on:
  workflow_dispatch:
    inputs:
      run_frontend_tests:
        description: 'Run frontend test group (npm/vitest)'
        required: true
        type: boolean
        default: true
      run_rust_tests:
        description: 'Run rust test group (cargo test -q)'
        required: true
        type: boolean
        default: true
      vitest_verbose:
        description: 'Include verbose vitest run in frontend group'
        required: true
        type: boolean
        default: false
      repeat_count:
        description: 'Repeat selected test group(s), 1-5'
        required: true
        type: string
        default: '1'

jobs:
  test-diagnose:
    name: Test diagnose (manual)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        if: ${{ inputs.run_rust_tests }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci

      - name: Run diagnose tests
        env:
          RUN_FRONTEND_TESTS: ${{ inputs.run_frontend_tests }}
          RUN_RUST_TESTS: ${{ inputs.run_rust_tests }}
          VITEST_VERBOSE: ${{ inputs.vitest_verbose }}
          REPEAT_COUNT: ${{ inputs.repeat_count }}
        run: npm run test:diagnose

      - name: Upload diagnose artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnose-${{ github.run_id }}
          path: .artifacts/test-diagnose/**
          if-no-files-found: warn
