name: Release

on:
  # Official releases: immutable, versioned tags.
  push:
    tags:
      - "v*.*.*"
    # Pre-release candidate builds: artifacts only (no GitHub Release publish).
    branches:
      - "release/**"
  # Manual trigger for ad-hoc packaging/debugging.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-apple-silicon:
    name: Build macOS package (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (Apple Silicon)
        run: rustup target add aarch64-apple-darwin

      - name: Install JS deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri bundle (aarch64-apple-darwin)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release

          # macOS runners use bash 3.x: avoid mapfile/globstar.
          files=()

          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find src-tauri/target -type f -path '*/bundle/*' \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.sig" -o \
            -name "*.zip" -o \
            -name "*.tar.gz" -o \
            -name "*.pkg" \
          \) -print0 2>/dev/null || true)

          # Some Tauri setups may only output raw .app bundles.
          while IFS= read -r -d '' d; do
            files+=("$d")
          done < <(find src-tauri/target -type d -path '*/bundle/*' -name "*.app" -print0 2>/dev/null || true)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found under target bundle path"
            find src-tauri/target -maxdepth 8 -print | head -n 300 || true
            exit 1
          fi

          for f in "${files[@]}"; do
            cp -Rv "$f" dist-release/
          done

          echo "Collected artifacts:"
          ls -lah dist-release

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: lazy-editor-macos-aarch64-${{ github.sha }}
          path: dist-release/*
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          draft: false
          prerelease: false
