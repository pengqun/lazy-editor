name: Release

on:
  # Official releases: immutable, versioned tags.
  push:
    tags:
      - "v*.*.*"
    # Pre-release candidate builds: artifacts only (no GitHub Release publish).
    branches:
      - "release/**"
  # Manual trigger for ad-hoc packaging/debugging.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-apple-silicon:
    name: Build macOS package (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (Apple Silicon)
        run: rustup target add aarch64-apple-darwin

      - name: Install JS deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri bundle (aarch64-apple-darwin)
        env:
          # Optional signing/notarization inputs.
          # If unset, build remains unsigned (usable for internal testing).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release

          # Include common macOS bundles and updater artifacts generated by Tauri.
          shopt -s nullglob globstar
          files=(
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.sig
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.zip
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.pkg
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found under target bundle path"
            exit 1
          fi

          for f in "${files[@]}"; do
            cp -v "$f" dist-release/
          done

          echo "Collected artifacts:"
          ls -lah dist-release

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: lazy-editor-macos-aarch64-${{ github.sha }}
          path: dist-release/*
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          draft: false
          prerelease: false
