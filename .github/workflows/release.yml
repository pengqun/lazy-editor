name: Release

on:
  # Official releases: immutable, versioned tags.
  push:
    tags:
      - "v*.*.*"
    # Pre-release candidate builds: artifacts only (no GitHub Release publish).
    branches:
      - "release/**"
  # Manual trigger for ad-hoc packaging/debugging.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-apple-silicon:
    name: Build macOS package (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (Apple Silicon)
        run: rustup target add aarch64-apple-darwin

      - name: Install JS deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Apple code-signing setup (skipped when secrets are absent) ──
      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" ] && \
             [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ] && \
             [ -n "${{ secrets.APPLE_TEAM_ID }}" ] && \
             [ -n "${{ secrets.APPLE_ID }}" ] && \
             [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer ID certificate
        if: steps.signing.outputs.available == 'true'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Decode the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate into the keychain
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Prepend the temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Clean up the cert file
          rm -f "$CERT_PATH"

          echo "Certificate imported into temporary keychain."

      - name: Warn if signing secrets are missing
        if: steps.signing.outputs.available != 'true'
        run: |
          echo "::warning::Apple signing secrets are not configured. The build will produce UNSIGNED artifacts that trigger Gatekeeper warnings."
          echo "::warning::See docs/release.md for required GitHub Actions secrets."

      # ── Tauri build (with or without signing) ──
      - name: Build Tauri bundle (aarch64-apple-darwin)
        env:
          # Tauri v2 reads these env vars for signing + notarization.
          # When unset, Tauri skips signing gracefully.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Verify code signature
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          APP_PATH=$(find src-tauri/target -type d -name "*.app" -path '*/bundle/*' | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Verifying signature on: $APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            echo "Signature verification passed."
          else
            echo "::warning::No .app bundle found to verify."
          fi

      - name: Clean up keychain
        if: always() && steps.signing.outputs.available == 'true'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release

          # macOS runners use bash 3.x: avoid mapfile/globstar.
          files=()

          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find src-tauri/target -type f -path '*/bundle/*' \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.sig" -o \
            -name "*.zip" -o \
            -name "*.tar.gz" -o \
            -name "*.pkg" \
          \) -print0 2>/dev/null || true)

          # Some Tauri setups may only output raw .app bundles.
          while IFS= read -r -d '' d; do
            files+=("$d")
          done < <(find src-tauri/target -type d -path '*/bundle/*' -name "*.app" -print0 2>/dev/null || true)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found under target bundle path"
            find src-tauri/target -maxdepth 8 -print | head -n 300 || true
            exit 1
          fi

          for f in "${files[@]}"; do
            cp -Rv "$f" dist-release/
          done

          echo "Collected artifacts:"
          ls -lah dist-release

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: lazy-editor-macos-aarch64-${{ github.sha }}
          path: dist-release/*
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          draft: false
          prerelease: false
