name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  version-gate:
    name: Version consistency gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Verify manifest version consistency (fail-fast)
        run: npm run version:check

  smoke-desktop-editor:
    name: Desktop smoke test (Tauri self-test)
    needs: version-gate
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (cargo + target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: npm ci

      - name: Build frontend (selftest mode)
        run: npm run build:selftest

      - name: Force selftest rebuild (embed fresh dist/)
        run: touch src-tauri/src/bin/selftest.rs

      - name: Build selftest binary
        env:
          TAURI_CONFIG: '{"build":{"devUrl":null,"frontendDist":"../dist"},"productName":"Lazy Editor Selftest","identifier":"com.lazy-editor.selftest"}'
        run: cd src-tauri && cargo build --bin lazy-editor-selftest

      - name: "Self-test: editor-basic"
        timeout-minutes: 2
        env:
          RUST_BACKTRACE: "1"
        run: src-tauri/target/debug/lazy-editor-selftest --workspace "$GITHUB_WORKSPACE" --self-test editor-basic

      - name: "Self-test: editor-undo-redo"
        timeout-minutes: 2
        env:
          RUST_BACKTRACE: "1"
        run: src-tauri/target/debug/lazy-editor-selftest --workspace "$GITHUB_WORKSPACE" --self-test editor-undo-redo

      - name: "Self-test: editor-formatting"
        timeout-minutes: 2
        env:
          RUST_BACKTRACE: "1"
        run: src-tauri/target/debug/lazy-editor-selftest --workspace "$GITHUB_WORKSPACE" --self-test editor-formatting
